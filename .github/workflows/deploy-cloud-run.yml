name: Deploy Softify to Cloud Run

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: softify-cloud-run-production
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Build, deploy, and smoke test
    runs-on: ubuntu-latest

    env:
      PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      REGION: ${{ secrets.GCP_REGION }}
      SERVICE: ${{ secrets.CLOUD_RUN_SERVICE }}
      SOFTIFY_TEST_SHOP: ${{ secrets.SOFTIFY_TEST_SHOP }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required deployment secrets
        run: |
          test -n "${{ secrets.GCP_PROJECT_ID }}" || (echo "Missing secret: GCP_PROJECT_ID" && exit 1)
          test -n "${{ secrets.GCP_REGION }}" || (echo "Missing secret: GCP_REGION" && exit 1)
          test -n "${{ secrets.CLOUD_RUN_SERVICE }}" || (echo "Missing secret: CLOUD_RUN_SERVICE" && exit 1)
          test -n "${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}" || (echo "Missing secret: GCP_WORKLOAD_IDENTITY_PROVIDER" && exit 1)
          test -n "${{ secrets.GCP_SERVICE_ACCOUNT }}" || (echo "Missing secret: GCP_SERVICE_ACCOUNT" && exit 1)
          test -n "${{ secrets.SOFTIFY_TEST_SHOP }}" || (echo "Missing secret: SOFTIFY_TEST_SHOP" && exit 1)        
          test -n "${{ secrets.SHOPIFY_API_KEY }}" || (echo "Missing secret: SHOPIFY_API_KEY" && exit 1)
          test -n "${{ secrets.SHOPIFY_APP_URL }}" || (echo "Missing secret: SHOPIFY_APP_URL" && exit 1)
          test -n "${{ secrets.SOFTIFY_AGENT_DEV_BYPASS_SECRET }}" || (echo "Missing secret: SOFTIFY_AGENT_DEV_BYPASS_SECRET" && exit 1)

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript / lint check
        run: npm run lint

      - name: Production build
        run: npm run build

      - name: Pre-deployment static release verification
        run: npm run verify:release

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Validate GCP Secret Manager Secrets
        run: |
          echo "Verifying Secret Manager configuration..."
          
          # Check SHOPIFY_API_SECRET
          if gcloud secrets describe SHOPIFY_API_SECRET --project="${{ secrets.GCP_PROJECT_ID }}" >/dev/null && \
             gcloud secrets versions list SHOPIFY_API_SECRET --project="${{ secrets.GCP_PROJECT_ID }}" --filter='state=ENABLED' --format='value(name)' | grep -q .; then
            echo "- SHOPIFY_API_SECRET exists and has enabled version: yes"
          else
            echo "- SHOPIFY_API_SECRET exists and has enabled version: no"
            exit 1
          fi

          # Check SHOPIFY_TOKEN_ENCRYPTION_KEY
          if gcloud secrets describe SHOPIFY_TOKEN_ENCRYPTION_KEY --project="${{ secrets.GCP_PROJECT_ID }}" >/dev/null && \
             gcloud secrets versions list SHOPIFY_TOKEN_ENCRYPTION_KEY --project="${{ secrets.GCP_PROJECT_ID }}" --filter='state=ENABLED' --format='value(name)' | grep -q .; then
            echo "- SHOPIFY_TOKEN_ENCRYPTION_KEY exists and has enabled version: yes"
          else
            echo "- SHOPIFY_TOKEN_ENCRYPTION_KEY exists and has enabled version: no"
            exit 1
          fi

          # Check SOFTIFY_AGENT_DEV_BYPASS_SECRET
          if gcloud secrets describe SOFTIFY_AGENT_DEV_BYPASS_SECRET --project="${{ secrets.GCP_PROJECT_ID }}" >/dev/null && \
             gcloud secrets versions list SOFTIFY_AGENT_DEV_BYPASS_SECRET --project="${{ secrets.GCP_PROJECT_ID }}" --filter='state=ENABLED' --format='value(name)' | grep -q .; then
            echo "- SOFTIFY_AGENT_DEV_BYPASS_SECRET exists and has enabled version: yes"
          else
            echo "- SOFTIFY_AGENT_DEV_BYPASS_SECRET exists and has enabled version: no"
            exit 1
          fi

      - name: Pre-deployment Configuration Summary
        run: |
          echo "=== CONFIGURATION SUMMARY ==="
          echo "- GitHub env configured: yes"
          echo "- GCP Secret Manager secret exists: yes"
          echo "- Firestore backend: firestore"
          echo "- Firestore database: softify"
          if [ -n "${{ secrets.SHOPIFY_APP_URL }}" ]; then
            echo "- Shopify app URL configured: yes"
          else
            echo "- Shopify app URL configured: no"
          fi
          echo "============================="

      # NOTE: The Cloud Run runtime service account must have roles/secretmanager.secretAccessor role on:
      # - SHOPIFY_API_SECRET
      # - SHOPIFY_TOKEN_ENCRYPTION_KEY
      # - SOFTIFY_AGENT_DEV_BYPASS_SECRET
      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: ${{ secrets.CLOUD_RUN_SERVICE }}
          region: ${{ secrets.GCP_REGION }}
          source: .
          flags: >-
            --allow-unauthenticated
            --set-env-vars=^|^REPOSITORY_BACKEND=firestore|GOOGLE_CLOUD_PROJECT=${{ secrets.GCP_PROJECT_ID }}|FIRESTORE_DATABASE_ID=softify|FIRESTORE_STORE_CONNECTIONS_COLLECTION=shopify_store_connections|FIRESTORE_PRODUCT_SNAPSHOTS_COLLECTION=product_snapshots|AI_PROVIDER=mock|SOFTIFY_ALLOW_AGENT_DEV_BYPASS=true|SHOPIFY_API_KEY=${{ secrets.SHOPIFY_API_KEY }}|SHOPIFY_APP_URL=${{ secrets.SHOPIFY_APP_URL }}|APP_URL=${{ secrets.SHOPIFY_APP_URL }}|SHOPIFY_SCOPES=read_products,read_orders,read_customers,read_themes,read_content|SHOPIFY_APP_HANDLE=softify|SHOPIFY_TEST_SHOP=${{ secrets.SOFTIFY_TEST_SHOP }}|NODE_ENV=production
            --set-secrets=SHOPIFY_API_SECRET=SHOPIFY_API_SECRET:latest,SHOPIFY_TOKEN_ENCRYPTION_KEY=SHOPIFY_TOKEN_ENCRYPTION_KEY:latest,SOFTIFY_AGENT_DEV_BYPASS_SECRET=SOFTIFY_AGENT_DEV_BYPASS_SECRET:latest

      - name: Smoke test deployed service
        env:
          SOFTIFY_BASE_URL: ${{ steps.deploy.outputs.url }}
          SOFTIFY_TEST_SHOP: ${{ secrets.SOFTIFY_TEST_SHOP }}
          SOFTIFY_AGENT_DEV_BYPASS_SECRET: ${{ secrets.SOFTIFY_AGENT_DEV_BYPASS_SECRET }}
        run: npm run smoke:prod